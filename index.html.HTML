<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEKX AI PRO | Shivansh Choubey</title>
    <meta name="description" content="GREEKX AI PRO by Shivansh Choubey. A next-generation, high-fidelity AI web interface engineered for lightning-fast computational responses.">
    <meta name="keywords" content="GREEKX AI, GREEKX AI PRO, Shivansh Choubey, GreekX, AI Chatbot">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');
        
        :root { 
            --accent: #b4a2ff; 
            --cyan: #00f2ff;
            --bg: #030307; 
            --card: #09090e; 
            --text: #ffffff; 
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Space Grotesk', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        .main-canvas {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .badge-container {
            margin-bottom: 20px;
        }

        .intel-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(0, 242, 255, 0.05);
            padding: 6px 16px;
            border-radius: 20px;
            color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        #title { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4.5rem; 
            font-weight: 700; 
            color: var(--text);
            letter-spacing: 2px; 
            margin: 0; 
            text-transform: uppercase;
        }

        #title span {
            color: var(--accent);
            text-shadow: 0 0 40px rgba(180, 162, 255, 0.5);
        }

        #greet { 
            color: #8a8a93; 
            font-size: 0.85rem; 
            margin-top: 15px; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-weight: 500;
        }

        #chat-area {
            width: 100%;
            max-width: 750px;
            margin-top: 40px;
            max-height: 180px;
            overflow-y: auto;
        }

        .msg-box { 
            background: var(--card); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-left: 3px solid var(--cyan); 
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        .input-container { 
            width: 100%;
            max-width: 750px;
            margin-top: 40px;
            position: relative;
        }

        .search-pill { 
            display: flex;
            align-items: center;
            background: #09090f; 
            border: 1px solid #1a1a26; 
            padding: 6px 12px; 
            border-radius: 40px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .search-pill:focus-within { 
            border-color: rgba(0, 242, 255, 0.5); 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            transform: translateY(-2px);
        }

        .sparkle-icon {
            color: var(--cyan);
            margin-left: 15px;
            display: flex;
            align-items: center;
            opacity: 0.8;
        }

        input { 
            flex: 1;
            background: transparent; 
            border: none; 
            padding: 14px 15px; 
            color: white; 
            font-size: 1.05rem; 
            outline: none; 
            font-family: 'Space Grotesk', sans-serif;
        }

        input::placeholder {
            color: #4a4a5a;
        }

        .send-btn {
            background: #12121a;
            border: 1px solid #2a2a3a;
            color: #8a8a93;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-pill:focus-within .send-btn {
            color: var(--cyan);
            border-color: var(--cyan);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="main-canvas">
    
    <div class="badge-container">
        <span class="intel-badge">✦ Multimodal Intelligence Enabled</span>
    </div>

    <h1 id="title">HOW CAN <span>GREEKX AI</span> HELP YOU?</h1>
    <div id="greet">SYSTEM CORE CONTEXT BY SHIVANSH CHOUBEY</div>

    <div id="chat-area">
        <div class="msg-box">
            <strong>GREEKX AI:</strong> System core online. Pipeline connection validated successfully. Ready for high-fidelity execution.
        </div>
    </div>

    <div class="input-container">
        <div class="search-pill">
            <div class="sparkle-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
            </div>
            <input type="text" id="user-in" placeholder="Enter query or type instructions...">
            <div class="send-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </div>
        </div>
    </div>

</div>

<script>
    class Scrambler {
        constructor(el) { this.el = el; this.chars = '!<>-_\\/[]{}—=+*^?#________'; this.update = this.update.bind(this); }
        setText(newText) {
            const oldText = this.el.innerHTML; const length = Math.max(oldText.length, newText.length);
            const promise = new Promise((resolve) => this.resolve = resolve); this.queue = [];
            for (let i = 0; i < length; i++) {
                const from = oldText[i] || ''; const to = newText[i] || '';
                const start = Math.floor(Math.random() * 30); const end = start + Math.floor(Math.random() * 30);
                this.queue.push({ from, to, start, end });
            }
            cancelAnimationFrame(this.frameRequest); this.frame = 0; this.update(); return promise;
        }
        update() {
            let output = ''; let complete = 0;
            for (let i = 0, n = this.queue.length; i < n; i++) {
                let { from, to, start, end, char } = this.queue[i];
                if (this.frame >= end) { complete++; output += to; }
                else if (this.frame >= start) {
                    if (!char || Math.random() < 0.28) { char = this.chars[Math.floor(Math.random() * this.chars.length)]; this.queue[i].char = char; }
                    output += `<span style="color:var(--cyan)">${char}</span>`;
                } else { output += from; }
            }
            this.el.innerHTML = output;
            if (complete === this.queue.length) { this.resolve(); } else { this.frameRequest = requestAnimationFrame(this.update); this.frame++; }
        }
    }

    const tObj = new Scrambler(document.getElementById('title'));
    const gObj = new Scrambler(document.getElementById('greet'));
    
    window.onload = () => { 
        tObj.setText('HOW CAN <span>GREEKX AI</span> HELP YOU?'); 
        setTimeout(() => gObj.setText('SYSTEM CORE CONTEXT BY SHIVANSH CHOUBEY'), 800); 
    };

    // --- SECURE BACKEND INTERFACE ---
    async function generateResponse(userMessage) {
        let apiKey = localStorage.getItem('GREEKX_KEY');
        if (!apiKey) {
            apiKey = prompt("Please enter your Google Gemini API Key to initialize the core engine node:\n(Your key is saved safely in your browser and never sent to a server)");
            if (!apiKey) return "SYSTEM_ERROR: Unauthorized context. Key verification required.";
            localStorage.setItem('GREEKX_KEY', apiKey);
        }

        const apiUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: userMessage }]
                    }]
                })
            });
            
            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                return data.candidates[0].content.parts[0].text;
            } else if (data.error) {
                if (data.error.message.includes('API key')) {
                    localStorage.removeItem('GREEKX_KEY'); // Clear bad keys so it asks again
                }
                return `API_ERROR: ${data.error.message}`;
            } else {
                return "SYSTEM_NOTIFICATION: Invalid parsing format.";
            }
        } catch (error) {
            return "SYSTEM_ERROR: Network link dropped.";
        }
    }

    const inputField = document.getElementById('user-in');
    const chatArea = document.getElementById('chat-area');
    const sendBtn = document.querySelector('.send-btn'); 

    async function handleSubmission() {
        const userText = inputField.value.trim();
        if (userText === '') return;

        inputField.value = '';
        chatArea.innerHTML = `<div class="msg-box"><strong>GREEKX AI:</strong> Synchronizing engine matrices...</div>`;

        const aiResponse = await generateResponse(userText);
        chatArea.innerHTML = `<div class="msg-box"><strong>GREEKX AI:</strong> ${aiResponse}</div>`;
    }

    inputField.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            await handleSubmission();
        }
    });

    sendBtn.addEventListener('click', async () => {
        await handleSubmission();
    });
</script>
</body>
</html>
